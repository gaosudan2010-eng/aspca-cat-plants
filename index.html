<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI 日报中心：支持公司/优先级筛选、月度归档、详情阅读。" />
  <title>AI 日报中心</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <header class="header" role="banner">
      <div>
        <h1 class="title">AI 日报</h1>
        <p class="sub">标题 · 摘要 · 来源（可点击）</p>
      </div>
    </header>

    <main id="mainContent" tabindex="-1">
      <section aria-label="日报列表" style="max-width:100%">
        <h2 class="section-title">日报列表</h2>
        <div id="reportList" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="./data.js"></script>
  <script>
    const rawData = window.AI_DAILY_DATA || [];
    const data = [...rawData].sort((a, b) => b.date.localeCompare(a.date));

    const reportListEl = document.getElementById('reportList');

    function render() {
      if (!data.length) {
        reportListEl.innerHTML = '<div class="card empty" role="status">暂无日报数据。</div>';
        return;
      }

      reportListEl.innerHTML = data
        .map((item) => {
          const firstSource = item?.headlines?.[0]?.sources?.[0] || '';
          return `
          <article class="card report-card" role="link" tabindex="0" onclick="window.location.href='./detail.html?id=${encodeURIComponent(item.id)}'" onkeydown="if(event.key==='Enter'){window.location.href='./detail.html?id=${encodeURIComponent(item.id)}'}">
            <div class="meta">
              <span>${item.date}</span>
              <span>·</span>
              <span>${item.company}</span>
            </div>
            <h3>${item.title}</h3>
            <p>${item.summary}</p>
            ${firstSource ? `<a class="text-link" href="${firstSource}" target="_blank" rel="noopener" onclick="event.stopPropagation()">来源</a>` : ''}
          </article>
        `;
        })
        .join('');
    }

    render();
  </script>
</body>
</html>
