<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI 日报中心：支持公司/优先级筛选、月度归档、详情阅读。" />
  <title>AI 日报中心</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <header class="header" role="banner">
      <div>
        <h1 class="title">AI 日报</h1>
        <p class="sub">标题 · 摘要 · 来源（可点击）</p>
      </div>
    </header>

    <main id="mainContent" tabindex="-1">
      <section aria-label="今日总览" style="max-width:100%">
        <h2 class="section-title">今日总览</h2>
        <div id="dailyOverview" aria-live="polite"></div>
      </section>
      <section aria-label="日报列表" style="max-width:100%">
        <h2 class="section-title">日报列表</h2>
        <div id="reportList" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script>
    function initDailyData() {
      const rawData = window.AI_DAILY_DATA || [];
      const data = [...rawData].sort((a, b) => b.date.localeCompare(a.date));
      const reportListEl = document.getElementById('reportList');
      const overviewEl = document.getElementById('dailyOverview');

      function render() {
        if (!data.length) {
          reportListEl.innerHTML = '<div class="card empty" role="status">暂无日报数据。</div>';
          overviewEl.innerHTML = '';
          return;
        }

        const latest = data[0];
        const riskTemp = latest.riskTemperature || '未标注';
        const mainLine = latest.dailyMainline || latest.summary || '暂无主线';
        const updatedAt = latest.lastUpdatedAt || latest.headlines?.[0]?.lastVerifiedAt || '未标注';
        const dailyConclusion = latest.dailyConclusion || latest.title;

        overviewEl.innerHTML = `
          <article class="card">
            <div class="meta"><span>主结论</span><span>·</span><span>风险温度：${riskTemp}</span><span>·</span><span>更新时间：${updatedAt}</span></div>
            <h3>${dailyConclusion}</h3>
            <p>${mainLine}</p>
          </article>
        `;

        reportListEl.innerHTML = data
          .map((item) => {
            const firstSource = item?.headlines?.[0]?.sources?.[0] || '';
            const signal = item.signalLevel || 'B';
            const whyNow = item.whyNow || '';
            return `
            <article class="card report-card" role="link" tabindex="0" onclick="window.location.href='./detail.html?id=${encodeURIComponent(item.id)}'" onkeydown="if(event.key==='Enter'){window.location.href='./detail.html?id=${encodeURIComponent(item.id)}'}">
              <div class="meta">
                <span>${item.date}</span>
                <span>·</span>
                <span>${item.company}</span>
                <span>·</span>
                <span>信号等级 ${signal}</span>
              </div>
              <h3>${item.title}</h3>
              <p>${item.summary}</p>
              ${whyNow ? `<p><strong>为什么今天重要：</strong>${whyNow}</p>` : ''}
              ${firstSource ? `<a class="text-link" href="${firstSource}" target="_blank" rel="noopener" onclick="event.stopPropagation()">来源</a>` : ''}
            </article>
          `;
          })
          .join('');
      }

      render();
    }

    const script = document.createElement('script');
    script.src = `./data.js?v=${Date.now()}`;
    script.onload = initDailyData;
    document.body.appendChild(script);
  </script>
</body>
</html>
