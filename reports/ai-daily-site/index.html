<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI 日报中心：支持公司/优先级筛选、月度归档、详情阅读。" />
  <title>AI 日报中心</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <header class="header" role="banner">
      <div class="masthead-kicker">Intelligence for AI Operators</div>
      <div>
        <h1 class="title">AI Briefing</h1>
        <p class="sub">每日主线 · 风险温度 · 可执行动作</p>
      </div>
    </header>

    <main id="mainContent" tabindex="-1">
      <section aria-label="今日总览" style="max-width:100%">
        <h2 class="section-title">今日总览</h2>
        <div id="dailyOverview" aria-live="polite"></div>
      </section>
      <section aria-label="筛选器" style="max-width:100%">
        <div id="filters" class="filter-row" aria-live="polite"></div>
        <div id="companyFilters" class="filter-row" aria-live="polite"></div>
        <div id="tagFilters" class="filter-row" aria-live="polite"></div>
      </section>
      <section aria-label="日报列表" style="max-width:100%">
        <h2 class="section-title">日报列表</h2>
        <div id="reportList" class="report-grid" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script>
    function initDailyData() {
      const rawData = window.AI_DAILY_DATA || [];
      const data = [...rawData].sort((a, b) => b.date.localeCompare(a.date));
      const reportListEl = document.getElementById('reportList');
      const overviewEl = document.getElementById('dailyOverview');
      const filtersEl = document.getElementById('filters');
      const companyFiltersEl = document.getElementById('companyFilters');
      const tagFiltersEl = document.getElementById('tagFilters');
      let activeSignal = 'ALL';
      let activeCompany = 'ALL';
      let activeTag = 'ALL';

      const companyPool = ['ALL', ...new Set(data.map(i => i.company).filter(Boolean))].slice(0, 7);
      const tagPool = ['ALL', ...new Set(data.flatMap(i => i.tags || []).filter(Boolean))].slice(0, 10);

      function renderFilters() {
        const signals = ['ALL', 'S', 'A', 'B'];
        filtersEl.innerHTML = signals.map(s => `
          <button class="chip ${activeSignal===s ? 'chip-active' : ''}" onclick="window.__setSignal('${s}')">${s==='ALL' ? '全部信号' : `信号 ${s}`}</button>
        `).join('');

        companyFiltersEl.innerHTML = companyPool.map(c => `
          <button class="chip ${activeCompany===c ? 'chip-active' : ''}" onclick="window.__setCompany('${c.replace(/'/g, "\\'")}')">${c==='ALL' ? '全部公司' : c}</button>
        `).join('');

        tagFiltersEl.innerHTML = tagPool.map(t => `
          <button class="chip ${activeTag===t ? 'chip-active' : ''}" onclick="window.__setTag('${t}')">${t==='ALL' ? '全部主题' : t}</button>
        `).join('');
      }

      window.__setSignal = function(s){
        activeSignal = s;
        renderFilters();
        renderList();
      }
      window.__setCompany = function(c){
        activeCompany = c;
        renderFilters();
        renderList();
      }
      window.__setTag = function(t){
        activeTag = t;
        renderFilters();
        renderList();
      }

      function renderOverview() {
        if (!data.length) {
          overviewEl.innerHTML = '';
          return;
        }
        const latest = data[0];
        const riskTemp = latest.riskTemperature || '未标注';
        const mainLine = latest.dailyMainline || latest.summary || '暂无主线';
        const updatedAt = latest.lastUpdatedAt || latest.headlines?.[0]?.lastVerifiedAt || '未标注';
        const dailyConclusion = latest.dailyConclusion || latest.title;
        const mainHeadline = latest.headlines?.[0];
        const subHeadlines = (latest.headlines || []).slice(1, 4);

        overviewEl.innerHTML = `
          <article class="card overview-card">
            <div class="meta"><span>主结论</span><span>·</span><span>风险温度：${riskTemp}</span><span>·</span><span>更新时间：${updatedAt}</span></div>
            <h3>${dailyConclusion}</h3>
            <p>${mainLine}</p>
            ${mainHeadline ? `<div class="mainline"><strong>主线事件：</strong>${mainHeadline.title || mainHeadline.summary || ''}</div>` : ''}
            ${subHeadlines.length ? `<div class="subline"><strong>分线快讯：</strong><ul>${subHeadlines.map(h => `<li>${h.title || h.summary || ''}</li>`).join('')}</ul></div>` : ''}
          </article>
        `;
      }

      function renderList() {
        const view = data.filter(i => {
          const signalOK = activeSignal === 'ALL' || (i.signalLevel || 'B') === activeSignal;
          const companyOK = activeCompany === 'ALL' || i.company === activeCompany;
          const tagOK = activeTag === 'ALL' || (i.tags || []).includes(activeTag);
          return signalOK && companyOK && tagOK;
        });

        if (!view.length) {
          reportListEl.innerHTML = '<div class="card empty" role="status">当前筛选条件下暂无日报。</div>';
          return;
        }
        reportListEl.innerHTML = view.map((item) => {
          const firstSource = item?.headlines?.[0]?.sources?.[0] || '';
          const signal = item.signalLevel || 'B';
          const whyNow = item.whyNow || '';
          return `
            <article class="card report-card" role="link" tabindex="0" onclick="window.location.href='./detail.html?id=${encodeURIComponent(item.id)}'" onkeydown="if(event.key==='Enter'){window.location.href='./detail.html?id=${encodeURIComponent(item.id)}'}">
              <div class="meta">
                <span>${item.date}</span>
                <span>·</span>
                <span>${item.company}</span>
                <span>·</span>
                <span>信号等级 ${signal}</span>
              </div>
              <h3>${item.title}</h3>
              <p>${item.summary}</p>
              ${whyNow ? `<p class="why-now"><strong>为什么今天重要：</strong>${whyNow}</p>` : ''}
              ${firstSource ? `<a class="text-link" href="${firstSource}" target="_blank" rel="noopener" onclick="event.stopPropagation()">来源</a>` : ''}
            </article>
          `;
        }).join('');
      }

      renderOverview();
      renderFilters();
      renderList();
    }

    const script = document.createElement('script');
    script.src = `./data.js?v=${Date.now()}`;
    script.onload = initDailyData;
    document.body.appendChild(script);
  </script>
</body>
</html>
